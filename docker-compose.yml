# ============================================================
# docker-compose.yml
#
# This file makes it easy for anyone to start the analysis
# environment with one short command instead of a long
# "docker run" command with many flags.
#
# HOW TO USE:
#   docker compose up
#
# Then open the URL printed in the terminal (starts with
# http://127.0.0.1:8888/lab?token=...)
# ============================================================
version: "3"

services:
  analysis-env:
    image: awong62/dsci-310-group-04:latest
    ports:
      - "8888:8888"