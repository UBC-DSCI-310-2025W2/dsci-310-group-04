# ============================================================
# .github/workflows/publish_docker_image.yml
#
# This workflow automatically builds your Docker image and
# pushes it to DockerHub whenever the Dockerfile is changed.
#
# WHY: So anyone can pull the image with one command and run
# the analysis without installing anything manually.
# ============================================================

name: Publish Docker Image

# TRIGGER: Only run this workflow when a push happens on the
# main branch AND the Dockerfile was among the changed files.
# This avoids wasting build minutes on unrelated changes.
on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - renv.lock

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # GitHub-hosted runner (free for public repos)

    steps:
      # Step 1: Check out the repo so the runner can access the Dockerfile
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Log in to DockerHub using credentials stored as GitHub Secrets.
      # NEVER put your username/password directly in this file.
      # Instead, go to your repo → Settings → Secrets and variables
      # → Actions → New repository secret, and add:
      #   DOCKER_USERNAME  (your DockerHub username)
      #   DOCKER_PASSWORD  (your DockerHub access token — NOT your real password;
      #                     generate one at hub.docker.com → Account Settings → Security)
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build the Docker image from the Dockerfile in the repo root,
      # then push it to DockerHub.
      # Replace YOUR_DOCKERHUB_USERNAME with your actual DockerHub username.
      # The image will be available at:
      #   docker pull YOUR_DOCKERHUB_USERNAME/dsci-310-group-04:latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .          # Build context = root of the repo (where Dockerfile lives)
          push: true          # Actually push after building (set to false to test locally)
          tags: ${{ secrets.DOCKER_USERNAME }}/dsci-310-group-04:latest
